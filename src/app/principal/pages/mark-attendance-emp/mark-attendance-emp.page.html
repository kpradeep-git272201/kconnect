<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/principal/dashboard"></ion-back-button>
    </ion-buttons>
    <ion-title>Mark Attendance</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div *ngIf="inLocation==1">
    <div class="face-message" *ngIf="!capturedImage">
      <p>Blink your eye to capture image</p>
    </div>
    <div *ngIf="showCamera" class="camera-container">
      <div class="circle-frame">
        <img *ngIf="capturedImage" [src]="capturedImage" alt="Selfie" />
      </div>
    </div>
  
    <div *ngIf="successMessage" class="success-message">
      <ion-card class="attendance-alert-card">
        <ion-card-header class="ion-text-center">
          <ion-avatar class="attendance-avatar">
            <img *ngIf="capturedImage" [src]="capturedImage" alt="Selfie" />
          </ion-avatar>
          <ion-card-title>Attendance Marked!</ion-card-title>
          <ion-card-subtitle>{{ dateTime }}</ion-card-subtitle>
        </ion-card-header>
      
        <ion-card-content class="ion-text-center">
          <ion-icon name="checkmark-circle" color="success" size="large"></ion-icon>
          <p>{{successMessage}}</p>
        </ion-card-content>
      </ion-card>
    </div>
  
  
    <ion-card *ngIf="markAttendanceFailed" class="attendance-fail-card">
      <ion-card-header class="ion-text-center">
        <ion-icon name="close-circle" color="danger" size="large"></ion-icon>
        <ion-card-title>Attendance Failed</ion-card-title>
        <ion-card-subtitle>{{ dateTime }}</ion-card-subtitle> <!-- Bind to actual time -->
      </ion-card-header>
    
      <ion-card-content class="ion-text-center">
        <p>There was an issue while marking your attendance. Please try again.</p>
        <ion-button expand="block" color="danger" (click)="tryAgain()">Try Again</ion-button>
      </ion-card-content>
    </ion-card>
  </div>
  <div *ngIf="inLocation==0">
    <ion-card class="attendance-fail-card">
      <ion-card-header class="ion-text-center">
        <ion-card-title>Alert!</ion-card-title>
      </ion-card-header>
    
      <ion-card-content class="ion-text-center">
        <p>You are {{calculatedDistance}} meters away from the location.</p>
        <ion-button expand="block" color="danger" (click)="tryAgain()">Try Again</ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
