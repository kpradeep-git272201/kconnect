<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/apps/dashboard"></ion-back-button>
    </ion-buttons>
    <ion-title>Attendance Logs</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ng-container *ngIf="attendanceLogs?.length > 0; else noData">
    <ion-card *ngFor="let attendance of attendanceLogs">
      <ion-card-header>
        <ion-card-title>
          <ion-icon name="calendar-outline"></ion-icon>
          {{ attendance.date }}
        </ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <ion-grid>
          <ion-row>
            <ion-col size="6">
              <ion-chip color="success" outline>
                <ion-icon name="log-in-outline" color="success"></ion-icon>
                <ion-label>
                  <strong>In:</strong> {{ attendance.inTime }}
                </ion-label>
              </ion-chip>
            </ion-col>

            <ion-col size="6">
              <ion-chip color="danger" outline>
                <ion-icon name="log-out-outline" color="danger"></ion-icon>
                <ion-label>
                  <strong>Out:</strong> {{ attendance.outTime }}
                </ion-label>
              </ion-chip>
            </ion-col>
          </ion-row>

          <ion-row>
            <ion-col size="12">
              <ion-text color="medium">
                <p>
                  <strong>Working Hours:</strong>
                  {{ calculateWorkingHours(attendance.inTime, attendance.outTime) }}
                </p>
              </ion-text>
            </ion-col>
          </ion-row>
        </ion-grid>
      </ion-card-content>
    </ion-card>
  </ng-container>

  <ng-template #noData>
    <ion-text color="medium">
      <p class="ion-text-center">No attendance records found.</p>
    </ion-text>
  </ng-template>
</ion-content>
