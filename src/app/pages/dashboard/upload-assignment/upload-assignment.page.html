<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/apps/dashboard"></ion-back-button>
    </ion-buttons>
    <ion-title>Upload Assignment</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <form [formGroup]="assignmentForm">
    <ion-card class="homework-card">
      <ion-card-header>
        <ion-card-title class="centered-title">
          <ion-icon name="book-outline"></ion-icon>
          Assignment Details
        </ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <ion-item>
          <ion-label position="stacked">Submition Date (yyyy-mm-dd)</ion-label>
          <div class="calendar-date-row">
            <ion-icon [ariaDisabled]="true" name="calendar-outline" class="calendar-icon" (click)="openDatePicker()"></ion-icon>
            <input type="date" #hiddenDateInput (change)="formatDate($event)" class="hidden-date-input" readonly />
            <span class="selected-date-text">{{ submitionDate }}</span>
          </div>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">Class</ion-label>
          <ion-select formControlName="classId" interface="popover" placeholder="Select" (ionChange)="onClassChange($event)">
            <ion-select-option *ngFor="let class of classList" [value]="class.code">
              Class {{ class.value }}
            </ion-select-option>
          </ion-select>
          <ion-text color="danger" *ngIf="assignmentForm.get('classId')?.touched && assignmentForm.get('classId')?.invalid">
            <small>Class is required</small>
          </ion-text>
        </ion-item>

        <ion-item *ngIf="assignmentForm.controls['classId']?.value">
          <ion-label position="stacked">Subject</ion-label>
          <ion-select formControlName="subjectId" interface="popover" placeholder="Select" (ionChange)="onSubjectChange($event)">
            <ion-select-option *ngFor="let subject of subjectList" [value]="subject.code">
              {{ subject.value }}
            </ion-select-option>
          </ion-select>
          <ion-text color="danger" *ngIf="assignmentForm.get('subjectId')?.touched && assignmentForm.get('subjectId')?.invalid">
            <small>Subject is required</small>
          </ion-text>
        </ion-item>

        <!-- Work Title Input -->
        <ion-item>
          <ion-label position="floating">Work Title</ion-label>
          <ion-input type="text" formControlName="workTitle"></ion-input>
          <ion-text color="danger" *ngIf="assignmentForm.get('workTitle')?.touched && assignmentForm.get('workTitle')?.invalid">
            <small>Work Title is required</small>
          </ion-text>
        </ion-item>
       

        <!-- Work Content Textarea -->
        <ion-item>
          <ion-label position="floating">Work Content</ion-label>
          <ion-textarea autoGrow="true" formControlName="workContent"></ion-textarea>
          <ion-text color="danger" *ngIf="assignmentForm.get('workContent')?.touched && assignmentForm.get('workContent')?.invalid">
            <small>Work Content is required</small>
          </ion-text>
        </ion-item>
     

        <!-- Submit Button -->
        <div class="ion-text-center ion-margin-top">
          <ion-button expand="block" color="primary" (click)="submitAssignment()">
            <ion-icon name="cloud-upload-outline" slot="start"></ion-icon>
            {{buttonText}}
          </ion-button>
        </div>
      </ion-card-content>
    </ion-card>

    <input type="hidden" formControlName="assignmentId" />

  </form>
</ion-content>
<ion-footer>
  <ion-toolbar >
    <ion-tab-bar color="secondary">
      <ion-tab-button  (click)="goToDashboard()">
        <ion-icon class="icon-md" name="apps-outline"></ion-icon>
        <ion-label>Dashboard</ion-label>
      </ion-tab-button>
      <ion-tab-button (click)="goToUploadAssignment()">
        <ion-icon class="icon-md" name="document-outline"></ion-icon>
        <ion-label>Assignment</ion-label>
      </ion-tab-button>
      <ion-tab-button  (click)="goToUploadHomework()">
        <ion-icon class="icon-md" name="book-outline"></ion-icon>
        <ion-label>Homework</ion-label>
      </ion-tab-button>
    </ion-tab-bar>
  </ion-toolbar>
</ion-footer>
